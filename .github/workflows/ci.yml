# ─────────────────────────────────────────────────────────────────────────
# CI — Moteur Multi-Agents
# Lint (ruff, informatif) + tests (pytest). Config : pyproject.toml
# ─────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [master]      # post-merge uniquement (les branches passent via pull_request)
  pull_request:

# Annule les runs précédents encore en cours sur la même réf.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 🔍 Ruff (informatif)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Installer ruff
        run: pip install "ruff>=0.6.0"
      # NON bloquant : dette ruff legacy (~320 violations). Voir plan de remédiation
      # (item nettoyage lint). Retirer les `continue-on-error` une fois résorbée.
      - name: ruff check
        run: ruff check . --output-format=github
        continue-on-error: true
      - name: ruff format --check
        run: ruff format --check .
        continue-on-error: true

  tests:
    name: 🧪 Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Seed des bases (modèles)
        run: python seed_models_db.py
      - name: pytest
        run: pytest --tb=short -q
