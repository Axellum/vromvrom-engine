# ─────────────────────────────────────────────────────────────────────────
# CI — vromvrom-engine (miroir public)
# Lint (ruff, informatif) + scan anti-fuite (bloquant) + pytest.
# Branche par défaut : main. Les mises à jour passent par PR.
# ─────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  oss-secrets-scan:
    name: 🔒 OSS secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Scan IP LAN / tokens / clés
        run: python scripts/oss_secrets_scan.py

  lint:
    name: 🔍 Ruff (informatif)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Installer ruff
        run: pip install "ruff>=0.6.0"
      # NON bloquant : dette ruff legacy. Retirer continue-on-error une fois résorbée.
      - name: ruff check
        run: ruff check . --output-format=github
        continue-on-error: true
      - name: ruff format --check
        run: ruff format --check .
        continue-on-error: true

  tests:
    name: 🧪 Pytest
    runs-on: ubuntu-latest
    needs: [oss-secrets-scan]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Seed des bases (modèles)
        run: python seed_models_db.py
      - name: pytest
        run: pytest --tb=short -q
