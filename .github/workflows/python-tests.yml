name: Python CI & Security

on:
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # requirements-dev.txt : pytest, pytest-asyncio, paramiko (requis par test_failover), etc.
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

    - name: Security Scan (Bandit)
      run: |
        bandit -r . -f custom -c pyproject.toml || true
        # On ne bloque pas la CI pour Bandit au début, juste un warning

    - name: Seed models registry DB
      # Peuple models_registry.db à partir du catalogue statique (aucun secret/réseau requis).
      # Requis par tests/test_models_db.py qui asserte l'existence et le contenu de la base.
      run: python seed_models_db.py

    - name: Run Pytest
      run: |
        pytest tests/
