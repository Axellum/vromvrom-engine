name: Python CI & Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-scan:
    name: test-and-scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

    - name: Security Scan (Bandit)
      run: |
        bandit -r . -f custom -c pyproject.toml || true

    - name: OSS secrets / LAN IP scan (bloquant)
      run: python scripts/oss_secrets_scan.py

    - name: Seed models registry DB
      run: |
        cp ha_commands.json.example ha_commands.json
        cp pricing_strategy.json.example pricing_strategy.json
        python seed_models_db.py

    - name: Run Pytest
      run: |
        pytest tests/
