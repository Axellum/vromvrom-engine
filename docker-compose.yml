version: '3.8'

services:
  vromvrom-engine:
    build: .
    container_name: vromvrom-engine
    ports:
      - "8000:8000"
    volumes:
      - ./config.json:/app/config.json
      - ./memory.db:/app/memory.db
      - ./models_registry.db:/app/models_registry.db
      - ./chroma_db:/app/chroma_db
      - ./plugins:/app/plugins
      - ./workflows:/app/workflows
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
